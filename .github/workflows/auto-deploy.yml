name: Auto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Mencegah deploy ganda berjalan bersamaan
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-assets:
    name: Build Frontend Assets (CI)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Create .env for build
        run: cp .env.example .env

      - name: Install NPM dependencies
        run: |
          npm cache clean --force
          npm ci --legacy-peer-deps

      - name: Build frontend assets
        run: npm run build

      - name: Verify manifest.json
        run: |
          if [ ! -s "public/build/manifest.json" ]; then
            echo "[ERROR] public/build/manifest.json tidak ditemukan atau kosong."
            exit 1
          fi
          echo "[OK] manifest.json valid ($(wc -c < public/build/manifest.json) bytes)."

      - name: Package build assets
        run: |
          # Buat ZIP dengan nama unik (untuk artifact traceability)
          SHA_ZIP="lanyard-build-${{ github.sha }}.zip"
          # Buat juga dengan nama tetap (untuk release rolling — overwrite tiap deploy)
          RELEASE_ZIP="lanyard-build.zip"
          zip -r "$SHA_ZIP" public/build
          cp "$SHA_ZIP" "$RELEASE_ZIP"
          echo "SHA_ZIP=$SHA_ZIP" >> "$GITHUB_ENV"
          echo "RELEASE_ZIP=$RELEASE_ZIP" >> "$GITHUB_ENV"

      - name: Upload build artifact (with SHA, for traceability)
        uses: actions/upload-artifact@v4
        with:
          name: build-assets-${{ github.sha }}
          path: lanyard-build-${{ github.sha }}.zip
          retention-days: 7

      - name: Update rolling GitHub Release (latest-build)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Frontend Build - ${{ github.sha }}"
          body: |
            Auto-built from commit `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
            - Commit: ${{ github.sha }}
            - Build time: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          files: lanyard-build.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: Cleanup Old Workflow Runs
    runs-on: ubuntu-latest
    needs: build-assets
    if: always()
    permissions:
      actions: write
    steps:
      - name: Hapus workflow runs lama (simpan 5 terbaru)
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-deploy.yml',
              per_page: 100,
            });
            const allRuns = data.workflow_runs.sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at)
            );
            const otherRuns = allRuns.filter(run => run.id !== context.runId);
            const runsToDelete = otherRuns.slice(4);
            for (const run of runsToDelete) {
              await github.rest.actions.deleteWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });
              console.log(`Deleted run: ${run.id} (${run.display_title})`);
            }
            console.log(`Kept: ${Math.min(4, otherRuns.length) + 1} runs, Deleted: ${runsToDelete.length} runs`);
